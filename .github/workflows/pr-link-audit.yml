name: PR link audit (new repo links)

# Advisory bot: when a PR adds a new github.com/owner/repo link, post a sticky
# comment with that repo's stars / license / archived / last-push, checked
# against CONTRIBUTING §策展標準 (maintained ≤6mo · clear license · not archived).
# NEVER fails the build — it surfaces facts; the maintainer decides. No LLM, no
# pip deps: gh CLI + stdlib Python only (scripts/pr-link-audit.py).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.md'

permissions:
  contents: read
  pull-requests: write

# One run per PR; a new push cancels the previous (the comment is sticky anyway).
concurrency:
  group: pr-link-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit new repo links
    runs-on: ubuntu-latest
    # Fork PRs get a read-only GITHUB_TOKEN, so the comment POST would 403.
    # Skip them cleanly rather than fail; maintainer-side branches still run.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need both base and head SHAs for the diff

      - name: Run audit over the PR diff
        id: audit
        # Belt-and-suspenders for the "never fails the build" invariant: the
        # script already catches everything and returns 0, and the extraction
        # below is failure-proof, but this guarantees the step is advisory even
        # if the shell itself hiccups.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Route context values through env (not inline ${{ }}) per the CI
          # hardening guide. SHAs only — never head.ref/title/body.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # base...head (three-dot) = exactly this PR's changes.
          out=$(python3 scripts/pr-link-audit.py \
                  --base "$BASE_SHA" --head "$HEAD_SHA" --out /tmp/audit.md || true)
          n=$(printf '%s' "$out" | grep -oE 'NEW_REPOS=[0-9]+' | cut -d= -f2 || true)
          echo "count=${n:-0}" >> "$GITHUB_OUTPUT"
          echo "New repos added by this PR: ${n:-0}"

      - name: Post or update sticky comment
        # Only when the audit step actually succeeded AND found new repos. And
        # continue-on-error so a transient gh/network failure when posting the
        # comment never turns into a failing check on a contributor's PR (the
        # whole feature is advisory).
        if: steps.audit.outcome == 'success' && steps.audit.outputs.count != '0'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          marker="<!-- pr-link-audit -->"
          # Find OUR previous comment (if any) across all pages; reuse it so we
          # don't spam a fresh comment on every push. Scope to the Actions bot
          # author so we can't PATCH-overwrite a human comment that merely quotes
          # the marker string.
          id=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"$marker\"))) | .id" \
                | head -1)
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$id" \
              -F body=@/tmp/audit.md >/dev/null
            echo "Updated existing audit comment #$id"
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" \
              -F body=@/tmp/audit.md >/dev/null
            echo "Posted new audit comment"
          fi
